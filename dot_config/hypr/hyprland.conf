#################
### VARIABLES ###
#################

source = hyprvars.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=$default_monitor,highres@highrr,0x0,1.0
monitor=,preferred, auto, 1, transform, 0


#############################
### ENVIRONMENT VARIABLES ###
### && NVIDIA             ###
#############################

# set in $HOME/.config/uwsm/env
# https://wiki.hypr.land/Configuring/Environment-variables/
# https://wiki.hypr.land/Nvidia/

# if linux-zen - ensure linux-zen-headers are installed if lts than lts


#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = swaybg --image $background_image --mode fill
exec-once = mako
exec-once = systemctl --user start hyprpolkitagent


#####################
### LOOK AND FEEL ###
#####################

general {
	gaps_in  = $gaps_in
	gaps_out = $gaps_out

	border_size = $border_size

	col.active_border   = rgba(CCCCCCff)
	col.inactive_border = rgba(000000ff)

	resize_on_border = false

	allow_tearing = false

	layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decnstack
decoration {
	active_opacity = 1.0
	dim_inactive   = false
	dim_strength   = 0.4

	rounding = $rounding

	shadow {
		enabled = false
		range = 4
		render_power = 1
		color = rgba(101010cc)
	}

	blur {
		enabled = true
		size    = 4
		passes  = 2

		vibrancy = 1.1696
	}
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
	enabled = yes, please :)
	# Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
	#        NAME,           X0,   Y0,   X1,   Y1
	bezier = easeOutQuint,   0.23, 1,    0.32, 1
	bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
	bezier = linear,         0,    0,    1,    1
	bezier = almostLinear,   0.5,  0.5,  0.75, 1
	bezier = quick,          0.15, 0,    0.1,  1

	# Default animations, see https://wiki.hypr.land/Configuring/Animations/
	#           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
	animation = global,        1,     5.0,   default
	animation = border,        1,     2.6,   easeOutQuint
	animation = windows,       0,     2.3,   easeOutQuint
	animation = windowsIn,     1,     1.2,   easeOutQuint, popin 87%
	animation = windowsOut,    1,     0.6,   linear,       popin 87%
	animation = fadeIn,        1,     0.8,   almostLinear
	animation = fadeOut,       1,     0.7,   almostLinear
	animation = fade,          1,     1.5,   quick
	animation = layers,        1,     1.9,   easeOutQuint
	animation = layersIn,      1,     2.0,   easeOutQuint, fade
	animation = layersOut,     1,     0.7,   linear,       fade
	animation = fadeLayersIn,  1,     0.8,   almostLinear
	animation = fadeLayersOut, 1,     0.6,   almostLinear
	animation = workspaces,    0,     0.9,   easeInOutCubic, fade
	animation = workspacesIn,  0,     0.6,   easeInOutCubic, fade
	animation = workspacesOut, 0,     0.9,   easeInOutCubic, fade
	animation = zoomFactor,    1,     3.5,   quick
}

master {
	allow_small_split = true
	orientation = left
	new_status = slave
	new_on_top = false
	mfact      = 0.60
	always_keep_position = false
}

misc {
	disable_hyprland_logo = true
}

###########################
### INPUTS AND KEYBINDS ###
###########################

source = hyprinput.conf


##############################
### WINDOWS AND WORKSPACES ###
##############################

# gaps on special workspace
workspace = s[true], gapsin:12, gapsout:24

# smart color
windowrule = match:workspace w[1], border_color rgba(000000ff)
windowrule = match:fullscreen_state_client 1, border_color rgba(000000ff)

# cool fullscreen
workspace = f[1], gapsin:0, gapsout:0, rounding:false

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Enable blur for mako
layerrule = blur on, match:namespace mako
layerrule = blur on, match:namespace waybar
